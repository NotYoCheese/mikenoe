lsi: false
safe: false
incremental: false
highlighter: rouge
baseurl: ""
gist:
  noscript: false
kramdown: 
  math_engine: mathjax
  syntax_highlighter: rouge

title: Mike Noe
url: https://mikenoe.com
markdown: kramdown

# for atom feed
author:
  name: Mike Noe
  email: mikejnoe@gmail.com

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections_dir: all_collections
collections:
  posts:
    output: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/
exclude: ["LICENSE", "README.md"]

social_links:
  linkedin: https://www.linkedin.com/in/mike-j-noe/
