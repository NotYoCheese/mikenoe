<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="tier-title tier-desc" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 680px; height: auto;">
  <title id="tier-title">Tiered fetching architecture</title>
  <desc id="tier-desc">Three escalating tiers for production web fetching. Tier 1 curl_cffi handles approximately 78 percent of fetches. Tier 2 Playwright recovers JS-rendered SPAs, adding 6 percent. Tier 3 residential proxy plus Playwright handles sophisticated bot detection, adding 4 percent. Hard paywalls are out of scope.</desc>
  <defs>
    <marker id="tier-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title block -->
  <text x="40" y="40" font-size="14" font-weight="500" fill="#2C2C2A">Tiered fetching architecture</text>
  <text x="40" y="60" font-size="12" fill="#5F5E5A">Escalate only on detected failure patterns. Most fetches never leave Tier 1.</text>

  <!-- Tier 1: curl_cffi (teal) -->
  <rect x="40" y="90" width="600" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="60" y="116" font-size="14" font-weight="500" fill="#085041">Tier 1 — curl_cffi (Chrome impersonation)</text>
  <text x="60" y="138" font-size="12" fill="#0F6E56">Solves: TLS/HTTP2 fingerprint gating. Cheap, fast, no browser overhead.</text>
  <text x="60" y="156" font-size="12" fill="#0F6E56">Handles ~78% of representative URLs.</text>

  <!-- Arrow + condition -->
  <line x1="340" y1="170" x2="340" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#tier-arrow)"/>
  <text x="356" y="190" font-size="12" fill="#888780" font-style="italic">on detected JS shell or auth wall</text>

  <!-- Tier 2: Playwright (amber) -->
  <rect x="40" y="210" width="600" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="60" y="236" font-size="14" font-weight="500" fill="#633806">Tier 2 — Playwright (headless browser)</text>
  <text x="60" y="258" font-size="12" fill="#854F0B">Solves: JS-rendered SPAs (YouTube, Reddit, TikTok, social).</text>
  <text x="60" y="276" font-size="12" fill="#854F0B">Adds ~6%. Browser overhead, higher per-fetch cost.</text>

  <!-- Arrow + condition -->
  <line x1="340" y1="290" x2="340" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#tier-arrow)"/>
  <text x="356" y="310" font-size="12" fill="#888780" font-style="italic">on persistent 403/challenge from priority host</text>

  <!-- Tier 3: Residential + Playwright (coral) -->
  <rect x="40" y="330" width="600" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="60" y="356" font-size="14" font-weight="500" fill="#712B13">Tier 3 — Residential proxy + Playwright</text>
  <text x="60" y="378" font-size="12" fill="#993C1D">Solves: Akamai-fronted retailers, canvas/behavioral detection.</text>
  <text x="60" y="396" font-size="12" fill="#993C1D">Adds ~4%. Costly. Reserve for high-priority hosts only.</text>

  <!-- Out of scope: paywalls (gray) -->
  <rect x="40" y="440" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="60" y="464" font-size="14" font-weight="500" fill="#444441">Out of scope — hard paywalls (WSJ, Reuters, Barron's)</text>
  <text x="60" y="484" font-size="12" fill="#5F5E5A">Route to alternative data source: partnerships, paid search APIs, accept the gap.</text>
</svg>
