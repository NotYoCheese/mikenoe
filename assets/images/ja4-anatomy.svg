<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" role="img" aria-labelledby="ja4-title ja4-desc" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 680px; height: auto;">
  <title id="ja4-title">Anatomy of a JA4 fingerprint</title>
  <desc id="ja4-desc">Breakdown of the Chrome JA4 fingerprint t13d1516h2_8daaf6152771_e5627efa2ab1 into three sections, with the first segment further decomposed into its six fields.</desc>
  <defs>
    <marker id="ja4-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="50" font-size="14" font-weight="500" fill="#2C2C2A">A real Chrome JA4 fingerprint</text>
  <text x="40" y="72" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#5F5E5A">t13d1516h2_8daaf6152771_e5627efa2ab1</text>

  <!-- Section 1: metadata (purple) -->
  <rect x="40" y="100" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="124" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#3C3489">t13d1516h2</text>
  <text x="130" y="142" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Readable metadata</text>

  <!-- Section 2: cipher hash (teal) -->
  <rect x="250" y="100" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="124" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#085041">8daaf6152771</text>
  <text x="340" y="142" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Sorted cipher hash</text>

  <!-- Section 3: extension hash (coral) -->
  <rect x="460" y="100" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="550" y="124" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#712B13">e5627efa2ab1</text>
  <text x="550" y="142" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Sorted extension hash</text>

  <!-- Arrow expanding section 1 -->
  <line x1="130" y1="156" x2="130" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#ja4-arrow)"/>

  <!-- Expanded section 1 -->
  <rect x="40" y="220" width="600" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="244" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#3C3489" letter-spacing="6">t  1  3  d  1  5  1  6  h  2</text>
  <text x="340" y="262" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Each field is a fixed-width slot</text>

  <!-- Slot leader lines -->
  <line x1="100" y1="295" x2="100" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <line x1="170" y1="295" x2="170" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <line x1="240" y1="295" x2="240" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <line x1="340" y1="295" x2="340" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <line x1="450" y1="295" x2="450" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>
  <line x1="570" y1="295" x2="570" y2="325" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2,2" fill="none"/>

  <!-- Slot labels -->
  <text x="100" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">t</text>
  <text x="100" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">TCP</text>
  <text x="100" y="384" font-size="12" text-anchor="middle" fill="#5F5E5A">(q = QUIC)</text>

  <text x="170" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">13</text>
  <text x="170" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">TLS 1.3</text>

  <text x="240" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">d</text>
  <text x="240" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">SNI present</text>
  <text x="240" y="384" font-size="12" text-anchor="middle" fill="#5F5E5A">(i = IP only)</text>

  <text x="340" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">15</text>
  <text x="340" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">15 cipher suites</text>

  <text x="450" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">16</text>
  <text x="450" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">16 extensions</text>

  <text x="570" y="350" font-size="14" font-weight="500" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#2C2C2A">h2</text>
  <text x="570" y="368" font-size="12" text-anchor="middle" fill="#5F5E5A">HTTP/2 ALPN</text>
  <text x="570" y="384" font-size="12" text-anchor="middle" fill="#5F5E5A">(h1, h3 also)</text>

  <text x="340" y="424" font-size="12" text-anchor="middle" fill="#888780" font-style="italic">GREASE values are filtered before counting and hashing.</text>
</svg>
